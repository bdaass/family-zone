<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Family Zone — fashion for the whole family.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="no">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Family Zone">
  <link rel="apple-touch-icon" href="loading-logo.png">
  <link rel="icon" type="image/png" href="loading-logo.png"/>

  <title>Family Zone</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #F8F5F0;
    }

    #fz-loading {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #F8F5F0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      transition: opacity 0.2s ease;
      padding: 24px;
      box-sizing: border-box;
    }

    #fz-loading.fz-hide {
      opacity: 0;
      pointer-events: none;
    }

    #fz-loading img {
      width: 88px;
      height: 88px;
      object-fit: contain;
    }

    #fz-loading p {
      margin: 0;
      color: #6E6E7E;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      line-height: 1.45;
    }

    .fz-spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #EDE8E0;
      border-top-color: #E85D4A;
      border-radius: 50%;
      animation: fz-spin 0.85s linear infinite;
    }

    @keyframes fz-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="fz-loading" aria-live="polite" aria-busy="true">
    <img src="loading-logo.png" alt="Family Zone" width="88" height="88">
    <div class="fz-spinner" role="progressbar" aria-label="Loading"></div>
    <p id="fz-loading-text">Loading Family Zone…</p>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var params = new URLSearchParams(location.search);
      var forceIOS = params.get('fz_ios') === '1' || params.get('fz_debug_ios') === '1';
      var isIOS = forceIOS
        || /iPhone|iPad|iPod/i.test(ua)
        || (ua.indexOf('Macintosh') !== -1 && navigator.maxTouchPoints > 1);
      var isMobile = isIOS || /Android/i.test(ua);
      var isGecko = /Firefox\//i.test(ua) && !/Seamonkey\//i.test(ua);
      // Chromium Edge — HTML image overlays often 404 on skwasm; use fetch + Storage CORS instead.
      var isEdge = /Edg\//i.test(ua);

      window.__FZ_IS_IOS = isIOS;
      window.__FZ_IS_MOBILE = isMobile;
      window.__FZ_IS_GECKO = isGecko;
      window.__FZ_IS_EDGE = isEdge;
      window.__FZ_APP_BUILD = '2026-07-16-web5';

      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) { caches.delete(key); });
        });
      }

      if (params.get('fz_debug') === '1') {
        var reloads = parseInt(sessionStorage.getItem('fz_reload_count') || '0', 10) + 1;
        sessionStorage.setItem('fz_reload_count', String(reloads));
        console.info('[Family Zone] debug reload count:', reloads, 'ios=', isIOS);
      }

      // Drop stale Flutter service workers (offline-first breaks Edge image/network loads).
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }

      var lang = (navigator.language || '').toLowerCase();
      var text = document.getElementById('fz-loading-text');
      if (lang.indexOf('ar') === 0) {
        document.documentElement.lang = 'ar';
        document.documentElement.dir = 'rtl';
        text.textContent = 'جاري تحميل فاميلي زون…';
      }

      function hideLoading() {
        var el = document.getElementById('fz-loading');
        if (!el || el.classList.contains('fz-hide')) return;
        el.classList.add('fz-hide');
        setTimeout(function () { el.remove(); }, 220);
      }

      window.addEventListener('flutter-first-frame', hideLoading);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
