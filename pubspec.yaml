name: family_zone
description: "Family Zone — fashion for the whole family."
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core and Options
  firebase_core: ^3.11.0
  
  # Services needed for Family Zone
  firebase_auth: ^5.5.0       # For Admin, Employee, Client, and Guest roles
  cloud_firestore: ^5.6.0     # For storing clothes catalog and user accounts
  firebase_storage: ^12.4.0    # For uploading clothing item images
  cloud_functions: ^5.3.0      # Rate-limited contact form submissions

  image_picker: ^1.0.7      # Required to select images from gallery/camera
  flutter_image_compress: ^2.1.0 # Required to compress images before upload
  image: ^4.5.4                  # Hero banner center-crop to slot aspect ratio
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.2         # Enables the native Google pop-up sign-in sheet
  url_launcher: ^6.3.1           # WhatsApp checkout links
  package_info_plus: ^8.3.0      # Installed app version for update checks
  font_awesome_flutter: ^11.0.0  # v11+ required for Flutter 3.44+ (IconData is final)
  google_fonts: ^6.2.1           # Arabic + Latin UI fonts
  share_plus: ^10.1.4            # Share product links




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3


flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpeg
    - assets/images/logo.png
    - assets/images/logo_full.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png   # or assets/images/app_icon.png
  remove_alpha_ios: true               # iOS App Store rejects transparent icons

