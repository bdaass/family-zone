# Build & upload iOS to App Store Connect without a local Mac.
# Setup guide: https://docs.codemagic.io/flutter/flutter-projects/
#
# One-time Codemagic setup:
# 1. Connect this repo at codemagic.io
# 2. Apple Developer → App Store Connect → Users and Access → Integrations
#    → App Store Connect API → create key (Admin), download .p8
# 3. Codemagic → Team settings → Integrations → add Apple Developer + App Store Connect API key
# 4. Codemagic → Code signing identities → iOS → fetch/create certificate for com.familyzone.shop
# 5. Start workflow "ios-release" → after success, pick the build in App Store Connect

workflows:
  ios-release:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic  # rename to match your Codemagic ASC integration name
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.familyzone.shop
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: com.familyzone.shop
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads IPA in the Publishing post-processing step (no Transporter needed).
        submit_to_testflight: true
        beta_groups:
          - Family Zone employee
        submit_to_app_store: false
